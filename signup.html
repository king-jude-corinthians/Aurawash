<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign Up — AURA WASH</title>
<link rel="stylesheet" href="style.css">
<style>
.container{max-width:720px;margin:4rem auto;padding:2rem}
.panel{background:var(--panel);border:1px solid var(--border);padding:2rem;border-radius:10px}
.form-group{margin-bottom:1rem}
.label{display:block;color:var(--cyan);font-family:Orbitron,monospace;font-size:0.7rem;letter-spacing:1px}
.input{width:100%;padding:0.8rem;border:1px solid rgba(0,245,255,0.08);background:transparent;color:white}
.btn{display:inline-block;padding:0.8rem 1.2rem;background:linear-gradient(135deg,var(--blue),var(--cyan));color:var(--dark);border:none;border-radius:6px;cursor:none;font-weight:700}
.alert{background:rgba(255,0,0,0.06);border:1px solid rgba(255,0,0,0.12);padding:0.8rem;border-radius:6px;color:var(--text);display:none}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><em>AURA</em>WASH</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="washes.html">Washes</a></li>
    <li>
      <span>AURA Unlimited® ▾</span>
      <div class="dropdown">
        <a href="memberships.html">Become a Member</a>
        <a href="family-plan.html">Family Plan</a>
        <a href="fleet.html">Fleet Accounts</a>
      </div>
    </li>
    <li>
      <span>Community ▾</span>
      <div class="dropdown">
        <a href="impact.html">Our Impact</a>
        <a href="index.html#testimonials">Reviews</a>
      </div>
    </li>
    <li>
      <span>About ▾</span>
      <div class="dropdown">
        <a href="about.html">About Us</a>
        <a href="locations.html">Locations</a>
      </div>
    </li>
  </ul>
  <div class="nav-right">
    <a href="signup.html" class="nav-signin">Sign In</a>
    <a href="locations.html" class="nav-primary">Find Location</a>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>
<div class="container">
  <div class="panel">
    <h2 style="font-family:Orbitron,monospace;color:white;margin-bottom:0.5rem;">Create an Account</h2>
    <p style="color:var(--text);margin-bottom:1.2rem;">Sign up to manage subscriptions and redeem discounts.</p>
    <div id="alert" class="alert"></div>
    <div class="form-group">
      <label class="label">Full Name</label>
      <input id="name" class="input" placeholder="Your full name" />
    </div>
    <div class="form-group">
      <label class="label">Email</label>
      <input id="email" class="input" type="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label class="label">Password</label>
      <input id="password" class="input" type="password" placeholder="Choose a secure password" />
    </div>
    <div style="display:flex;gap:0.6rem;align-items:center;margin-top:1rem;">
      <button id="signupBtn" class="btn">Create Account</button>
      <a href="signin.html" style="color:var(--cyan);margin-left:0.5rem;">Already have an account? Sign in</a>
    </div>
  </div>
</div>
<script>
const isLocalFile = location.protocol === 'file:';
const isLocalHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const API_BASE = (window.__API_BASE__ || (isLocalFile || isLocalHost ? 'http://localhost:3000' : '')).replace(/\/$/, '');
function api(path){ const p = path.startsWith('/') ? path : '/' + path; return (API_BASE ? API_BASE : '') + '/api' + p; }

async function showAlert(msg){ const a = document.getElementById('alert'); a.textContent = msg; a.style.display = msg ? 'block' : 'none'; }

document.getElementById('signupBtn').addEventListener('click', async (e)=>{
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  if(!email || !password || !name) return showAlert('All fields required');
  try{
    const res = await fetch(api('/auth/signup'), {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if(!res.ok) return showAlert(data.error || 'Sign-up failed');
    // Auto sign-in after signup
    sessionStorage.setItem('currentUser', JSON.stringify(data.user));
    // Redirect to memberships page after sign up
    window.location.href = 'memberships.html';
  }catch(err){
    showAlert('Network error: ' + err.message);
  }
});
</script>
</body>
</html>
